<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=11">

<title>Acceso al Sistema</title>

<style>

body{
margin:0;
font-family:"Segoe UI",Arial;
background:linear-gradient(135deg,#0f3c68,#1e6aa8);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.login-box{
background:white;
padding:40px;
width:360px;
border-radius:10px;
box-shadow:0 10px 35px rgba(0,0,0,0.25);
animation:fadein .4s;
}

@keyframes fadein{
from{opacity:0;transform:translateY(-15px);}
to{opacity:1;}
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:240px;
}

h2{
text-align:center;
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
}

.input-group label{
font-size:13px;
color:#555;
}

.input-group input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

.input-group input:focus{
border-color:#1e6aa8;
outline:none;
}

.login-error{

display:none;
background:#fdecea;
color:#b71c1c;
padding:10px;
border-radius:6px;
font-size:13px;
margin-bottom:15px;
text-align:center;

}

.btn-login{
width:100%;
padding:12px;
background:#0f3c68;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
transition:.3s;
}

.btn-login:hover{
background:#1e6aa8;
}

.footer{
text-align:center;
font-size:12px;
color:#777;
margin-top:20px;
}

</style>

<script>

function mostrarError(msg){

var box=document.getElementById("loginError");

box.innerHTML=msg;
box.style.display="block";

}

function login(){

var usuario=document.getElementById("usuario").value.trim();
var pass=document.getElementById("password").value.trim();

if(usuario==""){

mostrarError("Debe ingresar el usuario");
return false;

}

if(pass==""){

mostrarError("Debe ingresar la contraseña");
return false;

}

window.location.href="access:login|"+usuario+"|"+pass;

return false;

}

/* permitir ENTER */

document.onkeydown=function(e){

e=e||window.event;

if(e.keyCode==13){

login();
return false;

}

};

</script>

</head>

<body>

<div class="login-box">

<div class="logo">

<img src="C:\SisPrueba\Images\LogoInterserviceFONDO-BLANCO.png">

</div>

<h2>Acceso al Sistema</h2>

<div id="loginError" class="login-error"></div>

<form onsubmit="return login();">

<div class="input-group">

<label>Usuario</label>

<input id="usuario" type="text" placeholder="Ingrese su usuario">

</div>

<div class="input-group">

<label>Contraseña</label>

<input id="password" type="password" placeholder="Ingrese su contraseña">

</div>

<button class="btn-login" type="submit">

Iniciar Sesión

</button>

</form>

<div class="footer">

© 2026 Sistema Corporativo

</div>

</div>

</body>
</html>
